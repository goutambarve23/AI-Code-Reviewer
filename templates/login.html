<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body {
            background: #343541;
            color: white;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: #202123;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: #343541;
            border: none;
            color: white;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #10a37f;
            border: none;
            color: white;
        }

        a {
            color: #10a37f;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Login</h2>

    <form method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

    <p>{{ error }}</p>

    <a href="/signup">Create account</a>
</div>

</body>
</html>
